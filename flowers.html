<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Flowers - Thaj Store</title>

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

  <!-- LOGO -->

  <div class="logo">
    Thaj Store Garlands
  </div>

  <!-- ================= SEARCH ================= -->

  <div class="search-wrapper">

    <div class="search-bar">

      <input
        type="text"
        id="searchInput"
        placeholder="Search flowers, jadai, malai..."
        autocomplete="off"
      >

      <span class="search-icon">
        🔍
      </span>

    </div>

    <!-- SEARCH RESULTS -->

    <div
      id="searchResults"
      class="search-results"
    ></div>

  </div>

  <!-- ================= ACTIONS ================= -->

  <div class="actions">

    <button
      class="btn"
      onclick="saveMobileNumber()"
    >
      Login
    </button>

    <!-- CART -->

    <a
      href="cart.html"
      class="btn"
    >

      Cart 🛒

      <span id="cart-count">
        0
      </span>

    </a>

  </div>

</header>

<!-- ================= CATEGORY NAVIGATION ================= -->

<nav class="category-bar">

  <a href="index.html">
    🏠 Home
  </a>

  <a
    href="flowers.html"
    class="active"
  >
    🌸 Flowers
  </a>

  <a href="dryfruits.html">
    🥜 Dry Fruits
  </a>

  <a href="grocery.html">
    🛒 Grocery
  </a>

  <a href="gifts.html">
    🎁 Gifts
  </a>

  <a href="birthday.html">
    🎂 Birthday
  </a>

  <a href="electronics.html">
    📱 Electronics
  </a>

</nav>

<!-- ================= PAGE TITLE ================= -->

<section class="section page-header">

  <h1 class="page-title">
    🌸 Flowers Collection
  </h1>

  <p class="page-subtitle">
    Explore flower subcategories and products
  </p>

</section>

<!-- ================= FLOWERS CATEGORIES ================= -->

<section class="section">

  <div
    id="flowersCategories"
    class="category-wrapper"
  ></div>

</section>

<!-- ================= CONTACT BUTTONS ================= -->

<div class="contact-buttons">

  <!-- CALL -->

  <a
    href="tel:+918903686085"
    class="call-btn"
  >
    📞 Call Us
  </a>

  <!-- WHATSAPP -->

  <a
    href="https://wa.me/918903686085?text=Hello%20I%20need%20help%20with%20flowers"
    target="_blank"
    class="whatsapp-btn"
  >
    💬 WhatsApp
  </a>

</div>

<!-- ================= FOOTER ================= -->

<footer>
  © 2026 Thaj Store | All Rights Reserved
</footer>

<!-- ================= MAIN SCRIPT ================= -->

<script src="script.js"></script>

<!-- ================= PAGE LOAD ================= -->

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    if (typeof updateCart === "function") {
      updateCart();
    }

    if (typeof renderCartPage === "function") {
      renderCartPage();
    }

    if (typeof fetchSheetData === "function") {
      fetchSheetData();
    }

  }
);


<script>

fetch("https://script.google.com/macros/s/AKfycbxCHB-adBL85se_hh8mxrvKVWFFsDZk9zYXIG-NF9vZCwgYJqdXKJy74XsEFPASPhecew/exec", {

  method: "POST",

  headers: {
    "Content-Type": "text/plain;charset=utf-8"
  },

  body: JSON.stringify({
    page: window.location.pathname
  })

})

.then(response => response.text())

.then(data => {

  console.log("SUCCESS:", data);

})

.catch(error => {

  console.error("ERROR:", error);

});

</script>

</script>

</body>
</html>
